<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkorGame</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />

    <!-- bootstraps -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="skorGame.css" />
  </head>
  <body>
    <audio src="button_press.mp3" id="pressButton"></audio>
    <main>
      <!-- <h1>SKOR GAME</h1> -->
      <div
        class="scoreboard container d-flex flex-column justify-content-center"
      >
        <div
          class="row row-cols-1 row-cols-md-2 text-center py-5 justify-content-center"
        >
          <div
            class="points col col-auto py-3 d-flex flex-column justify-content-center align-items-center"
          >
            <img
            id="congrats1"
              src="congrats.gif"
              alt="congrats_gif"
              class="position-absolute invisible"
            />
            <audio src="win_audio.mp3" id="audio1"></audio>
            <h2>Player 1</h2>
            <p id="skorDisplay1" class="px-3">0</p>
            <div class="score-btns">
              <button id="skorButton1" class="btn btn-primary">+1</button>
            </div>
          </div>

          <div
            class="points col col-auto py-3 d-flex flex-column justify-content-center align-items-center position-relative"
          >
            <img
            id="congrats2"
              src="congrats.gif"
              alt="congrats_gif"
              class="position-absolute invisible"
            />
            <audio src="win_audio.mp3" id="audio2"></audio>
            <h2>Player 2</h2>
            <p id="skorDisplay2" class="px-3">0</p>
            <div class="score-btns">
              <button id="skorButton2" class="btn btn-primary">+1</button>
            </div>
          </div>
        </div>

        <div class="d-grid gap-2 col col-2 col-md-4 mx-auto pb-5">
          <select id="maxSkorDisplay" class="py-2 border rounded-3 form-select">
            <option value="3" class="">3</option>
            <option value="5">5</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="d-grid gap-2 col col-2 col-md-2 mx-auto pb-5">
          <button id="Reset" class="btn btn-primary">Reset</button>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="skorGame.js"></script>
  </body>
</html>
